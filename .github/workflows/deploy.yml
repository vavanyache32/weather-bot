name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            cd /root/weatherapp
            # Backup local secrets before hard-reset
            cp .env /tmp/weatherapp-env-backup 2>/dev/null || true
            # Remove generated artefacts
            rm -rf bot/__pycache__
            # Force sync working tree with origin/main (handles any local drift)
            git fetch origin
            git reset --hard origin/main
            # Restore .env (it's in .gitignore and should never be in repo)
            cp /tmp/weatherapp-env-backup .env 2>/dev/null || true
            source .venv/bin/activate
            pip install -q -r requirements.txt
            systemctl restart weatherbot
